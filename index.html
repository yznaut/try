<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movie Watchlist Manager</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>Movie Watchlist Manager</h1>

<div class="auth-container" id="authContainer">
    <h2>Sign Up</h2>
    <input type="text" id="signupUsername" placeholder="Username" />
    <input type="password" id="signupPassword" placeholder="Password" />
    <button onclick="signUp()">Sign Up</button>
    <p>Already have an account? <a href="#" onclick="showLogin()">Sign In</a></p>
</div>

<div class="auth-container hidden" id="loginContainer">
    <h2>Sign In</h2>
    <input type="text" id="loginUsername" placeholder="Username" />
    <input type="password" id="loginPassword" placeholder="Password" />
    <button onclick="signIn()">Sign In</button>
    <p>Don't have an account? <a href="#" onclick="showSignUp()">Sign Up</a></p>
</div>

<div class="watchlist-container hidden" id="watchlistContainer">
    <button id="logoutBtn" onclick="logout()">Logout</button>
    <h2>My Movie Watchlist</h2>
    <div id="movieForm">
        <input type="text" id="movieInput" placeholder="Enter movie title" />
        <button id="addButton">Add Movie</button>
    </div>
    <ul id="watchlist"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
<script src="script.js"></script>

</body>
</html>
